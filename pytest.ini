[tool:pytest]
# pytest配置文件

# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试（需要跳过）
    web: Web相关测试
    database: 数据库测试

# 覆盖率配置（如果安装了pytest-cov）
# --cov=.
# --cov-report=term-missing
# --cov-report=html
# --cov-report=xml

# 测试超时（秒）
timeout = 30
timeout_method = thread